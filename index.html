<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>BrandForge - AI-Powered Brand & Product Design Studio</title>
    <meta name="title" content="BrandForge - AI-Powered Brand & Product Design Studio" />
    <meta name="description" content="Create professional product visuals, brand materials, and social media content with AI-powered tools. Transform your product photos and maintain consistent branding across all platforms." />
    <meta name="keywords" content="AI design, product photography, brand design, social media content, product enhancement, background removal" />
    <meta name="author" content="BrandForge" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://brandforge.com/" />
    <meta property="og:title" content="BrandForge - AI-Powered Brand & Product Design Studio" />
    <meta property="og:description" content="Create professional product visuals, brand materials, and social media content with AI-powered tools." />
    <meta property="og:image" content="https://brandforge.com/og-image.jpg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://brandforge.com/" />
    <meta property="twitter:title" content="BrandForge - AI-Powered Brand & Product Design Studio" />
    <meta property="twitter:description" content="Create professional product visuals, brand materials, and social media content with AI-powered tools." />
    <meta property="twitter:image" content="https://brandforge.com/twitter-image.jpg" />
    
    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    
    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://images.pexels.com" />
    
    <!-- Theme color -->
    <meta name="theme-color" content="#9333ea" />
    
    <!-- Progressive Web App -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BrandForge" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Fallback for users with JavaScript disabled -->
    <noscript>
      <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>BrandForge requires JavaScript to function properly. Please enable JavaScript in your browser and refresh the page.</p>
      </div>
    </noscript>
  </body>
</html>
